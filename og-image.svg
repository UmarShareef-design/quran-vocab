<?xml version='1.0' encoding='UTF-8'?>
<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 1200 630' width='1200' height='630'>
  <defs>
    <!-- Vibrant purple background gradient -->
    <linearGradient id='bgGrad' x1='0%' y1='0%' x2='100%' y2='100%'>
      <stop offset='0%' style='stop-color:#1e1b4b'/>
      <stop offset='100%' style='stop-color:#0f0a1e'/>
    </linearGradient>
    
    <!-- Strong purple glow -->
    <radialGradient id='glowPurple' cx='30%' cy='20%' r='70%'>
      <stop offset='0%' style='stop-color:#7c3aed;stop-opacity:0.5'/>
      <stop offset='100%' style='stop-color:#7c3aed;stop-opacity:0'/>
    </radialGradient>
    
    <!-- Accent glow -->
    <radialGradient id='glowAccent' cx='85%' cy='80%' r='50%'>
      <stop offset='0%' style='stop-color:#c4b5fd;stop-opacity:0.3'/>
      <stop offset='100%' style='stop-color:#c4b5fd;stop-opacity:0'/>
    </radialGradient>
    
    <!-- Card background -->
    <linearGradient id='cardBg' x1='0%' y1='0%' x2='0%' y2='100%'>
      <stop offset='0%' style='stop-color:#312e81'/>
      <stop offset='100%' style='stop-color:#1e1b4b'/>
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width='1200' height='630' fill='url(#bgGrad)'/>
  
  <!-- Strong glow effects -->
  <rect width='1200' height='630' fill='url(#glowPurple)'/>
  <rect width='1200' height='630' fill='url(#glowAccent)'/>
  
  <!-- Decorative circles -->
  <circle cx='100' cy='100' r='80' fill='#7c3aed' fill-opacity='0.15'/>
  <circle cx='1100' cy='550' r='120' fill='#a78bfa' fill-opacity='0.1'/>
  <circle cx='600' cy='300' r='200' fill='none' stroke='#7c3aed' stroke-width='1' stroke-opacity='0.1'/>
  
  <!-- Top banner -->
  <rect x='0' y='0' width='1200' height='6' fill='#7c3aed'/>
  
  <!-- Main card with strong border -->
  <rect x='60' y='60' width='1080' height='510' rx='24' fill='url(#cardBg)' stroke='#7c3aed' stroke-width='3'/>
  
  <!-- Inner highlight border -->
  <rect x='68' y='68' width='1064' height='494' rx='20' fill='none' stroke='rgba(255,255,255,0.25)' stroke-width='2'/>
  
  <!-- Brand badge - top left -->
  <g transform='translate(100, 100)'>
    <!-- Book icon -->
    <rect x='0' y='0' width='50' height='65' rx='6' fill='none' stroke='#fbbf24' stroke-width='3'/>
    <line x1='25' y1='0' x2='25' y2='65' stroke='#fbbf24' stroke-width='2'/>
    <path d='M8 12 L20 17 L8 22' fill='none' stroke='#fbbf24' stroke-width='2'/>
    <path d='M33 12 L45 17 L33 22' fill='none' stroke='#fbbf24' stroke-width='2'/>
    <line x1='12' y1='40' x2='22' y2='40' stroke='#fbbf24' stroke-width='2'/>
    <line x1='28' y1='40' x2='38' y2='40' stroke='#fbbf24' stroke-width='2'/>
  </g>
  
  <!-- Brand name - strong and visible -->
  <text x='175' y='155' font-family='Arial, Helvetica, sans-serif' font-size='38' font-weight='800' fill='#ffffff'>LearnQuranwords</text>
  
  <!-- Tagline -->
  <text x='175' y='180' font-family='Arial, Helvetica, sans-serif' font-size='16' fill='#a78bfa'>Free Quran Vocabulary Companion</text>
  
  <!-- Large Arabic text - THE STAR -->
  <text x='600' y='300' font-family='Amiri, Scheherazade New, Traditional Arabic, serif' font-size='140' font-weight='700' fill='#ffffff' text-anchor='middle'>الْقُرْآن</text>
  
  <!-- Glow behind Arabic text -->
  <circle cx='600' cy='280' r='120' fill='#7c3aed' fill-opacity='0.2'/>
  
  <!-- Transliteration - prominent -->
  <text x='600' y='365' font-family='Arial, Helvetica, sans-serif' font-size='36' font-weight='600' fill='#fbbf24' text-anchor='middle'>Al-Qur'an</text>
  
  <!-- Meaning text -->
  <text x='600' y='410' font-family='Arial, Helvetica, sans-serif' font-size='24' fill='#e0e7ff' text-anchor='middle'>Learn Quranic Arabic</text>
  
  <!-- Feature pills -->
  <g transform='translate(200, 460)'>
    <!-- 600 words pill -->
    <rect x='0' y='0' width='160' height='50' rx='25' fill='#7c3aed'/>
    <text x='80' y='33' font-family='Arial, Helvetica, sans-serif' font-size='26' font-weight='700' fill='#ffffff' text-anchor='middle'>600+ Words</text>
    
    <!-- Divider -->
    <rect x='180' y='10' width='3' height='30' rx='1.5' fill='rgba(255,255,255,0.3)'/>
    
    <!-- Free badge -->
    <rect x='200' y='0' width='120' height='50' rx='25' fill='none' stroke='#fbbf24' stroke-width='3'/>
    <text x='260' y='33' font-family='Arial, Helvetica, sans-serif' font-size='24' font-weight='700' fill='#fbbf24' text-anchor='middle'>FREE</text>
    
    <!-- Divider -->
    <rect x='340' y='10' width='3' height='30' rx='1.5' fill='rgba(255,255,255,0.3)'/>
    
    <!-- Online classes -->
    <rect x='360' y='0' width='220' height='50' rx='25' fill='rgba(255,255,255,0.1)' stroke='rgba(255,255,255,0.3)' stroke-width='2'/>
    <text x='470' y='33' font-family='Arial, Helvetica, sans-serif' font-size='18' font-weight='500' fill='#c4b5fd' text-anchor='middle'>Online Quran Classes</text>
  </g>
  
  <!-- Website URL - bottom right -->
  <text x='1140' y='520' font-family='Arial, Helvetica, sans-serif' font-size='18' fill='#c4b5fd' text-anchor='end' font-weight='600'>learnquranwords.com</text>
  
  <!-- Bottom accent line -->
  <rect x='0' y='624' width='1200' height='6' fill='#7c3aed'/>
  
  <!-- Decorative elements - top corners -->
  <circle cx='150' cy='150' r='60' fill='#7c3aed' fill-opacity='0.2'/>
  <circle cx='1050' cy='150' r='60' fill='#a78bfa' fill-opacity='0.15'/>
  
  <!-- Decorative elements - bottom corners -->
  <circle cx='100' cy='500' r='40' fill='#7c3aed' fill-opacity='0.15'/>
  <circle cx='1100' cy='500' r='50' fill='#c4b5fd' fill-opacity='0.1'/>
</svg>